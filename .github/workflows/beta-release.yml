name: Beta Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get current version
        id: current
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Get PR labels
        id: pr_labels
        run: |
          # Find the PR that was just merged
          PR_NUMBER=$(gh pr list --state merged --limit 1 --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            LABELS=$(gh pr view $PR_NUMBER --json labels --jq '.labels[].name' | tr '\n' ',')
            echo "labels=$LABELS" >> $GITHUB_OUTPUT
            echo "PR #$PR_NUMBER labels: $LABELS"
          else
            echo "labels=" >> $GITHUB_OUTPUT
            echo "No recent PR found"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Calculate new version
        id: version
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          LABELS="${{ steps.pr_labels.outputs.labels }}"

          # Parse current version
          if [[ $CURRENT =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(-beta\.([0-9]+))?$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            BETA="${BASH_REMATCH[5]}"
          else
            echo "Invalid version format: $CURRENT"
            exit 1
          fi

          echo "Parsed version: $MAJOR.$MINOR.$PATCH${BETA:+-beta.$BETA}"

          # Check for bump labels
          HAS_MAJOR=$(echo "$LABELS" | grep -o "bump:major" || true)

          if [ -z "$BETA" ]; then
            # Current version is stable - first beta after stable
            if [ -n "$HAS_MAJOR" ]; then
              # Major bump
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BETA=1
            else
              # Minor bump (default)
              MINOR=$((MINOR + 1))
              PATCH=0
              BETA=1
            fi
          else
            # Current version is already beta
            if [ -n "$HAS_MAJOR" ]; then
              # Breaking change - do major bump if not already done
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BETA=1
            else
              # Just increment beta counter
              BETA=$((BETA + 1))
            fi
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH-beta.$BETA"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update package.json version
        run: |
          NEW_VERSION="${{ steps.version.outputs.version }}"
          npm version $NEW_VERSION --no-git-tag-version
          echo "Updated package.json to $NEW_VERSION"

      - name: Commit version bump
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          NEW="${{ steps.version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "bump: From v$CURRENT to v$NEW"
          git push origin main

      - name: Create git tag
        run: |
          NEW="${{ steps.version.outputs.version }}"
          git tag "v$NEW"
          git push origin "v$NEW"

      - name: Build extension
        run: |
          npx @vscode/vsce package --pre-release

      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: v${{ steps.version.outputs.version }}
          body: |
            Beta release v${{ steps.version.outputs.version }}

            This is a pre-release version. Install from the VSIX file below or enable pre-release versions in VS Code.
          draft: false
          prerelease: true

      - name: Upload VSIX to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./gitsocks-${{ steps.version.outputs.version }}.vsix
          asset_name: gitsocks-${{ steps.version.outputs.version }}.vsix
          asset_content_type: application/octet-stream

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        run: |
          npx @vscode/vsce publish --pre-release --pat ${{ secrets.VSCE_PAT }}

      - name: Skip marketplace publish
        if: ${{ secrets.VSCE_PAT == '' }}
        run: |
          echo "⚠️ VSCE_PAT secret not configured - skipping marketplace publish"
          echo "Extension published to GitHub Releases only"
